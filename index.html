<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestra canción</title>
<meta name="description" content="Reproductor de nuestra canción">
<meta property="og:title" content="Nuestra canción">
<meta property="og:description" content="Dale play a nuestra canción">
<meta property="og:type" content="website">
</head>
<body style="margin:0; padding:0;">

<div style="background:#f2ede3; padding:40px 30px; border-radius:8px; max-width:420px; margin:0 auto; text-align:center; font-family: Georgia, 'Times New Roman', serif;">

  <p style="font-style: italic; color:#5a5347; font-size:18px; margin:0 0 28px;">
    Dale play a nuestra canción
  </p>

  <input type="range" id="seekbar" value="0" min="0" max="100" step="0.1"
    style="width:100%; -webkit-appearance:none; appearance:none; height:2px; background:#5a5347; border-radius:2px; outline:none; margin:0 0 24px; cursor:pointer;">

  <div style="display:flex; align-items:center; justify-content:center; gap:26px;">
    <button id="prevBtn" aria-label="Anterior" style="background:none; border:none; cursor:pointer; color:#5a5347;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <polygon points="19,5 8,12 19,19" fill="currentColor" stroke="none"/>
        <rect x="4" y="5" width="2" height="14" fill="currentColor" stroke="none"/>
      </svg>
    </button>

    <button id="playBtn" aria-label="Reproducir" style="background:none; border:1.5px solid #5a5347; border-radius:50%; width:46px; height:46px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:#5a5347;">
      <svg id="playIcon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <polygon points="6,4 20,12 6,20"/>
      </svg>
      <svg id="pauseIcon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="display:none;">
        <rect x="5" y="4" width="5" height="16"/>
        <rect x="14" y="4" width="5" height="16"/>
      </svg>
    </button>

    <button id="nextBtn" aria-label="Siguiente" style="background:none; border:none; cursor:pointer; color:#5a5347;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <polygon points="5,5 16,12 5,19" fill="currentColor" stroke="none"/>
        <rect x="18" y="5" width="2" height="14" fill="currentColor" stroke="none"/>
      </svg>
    </button>
  </div>

  <audio id="audio" src="song.mp3"></audio>
</div>

<style>
  #seekbar::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #5a5347;
    cursor: pointer;
  }
  #seekbar::-moz-range-thumb {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #5a5347;
    border: none;
    cursor: pointer;
  }
</style>

<script>
  const audio = document.getElementById('audio');
  const playBtn = document.getElementById('playBtn');
  const playIcon = document.getElementById('playIcon');
  const pauseIcon = document.getElementById('pauseIcon');
  const seekbar = document.getElementById('seekbar');

  playBtn.addEventListener('click', function() {
    if (audio.paused) {
      audio.play();
      playIcon.style.display = 'none';
      pauseIcon.style.display = 'block';
    } else {
      audio.pause();
      playIcon.style.display = 'block';
      pauseIcon.style.display = 'none';
    }
  });

  audio.addEventListener('timeupdate', function() {
    if (audio.duration) {
      seekbar.value = (audio.currentTime / audio.duration) * 100;
    }
  });

  seekbar.addEventListener('input', function() {
    if (audio.duration) {
      audio.currentTime = (seekbar.value / 100) * audio.duration;
    }
  });

  document.getElementById('prevBtn').addEventListener('click', function() {
    audio.currentTime = 0;
  });

  document.getElementById('nextBtn').addEventListener('click', function() {
    audio.currentTime = audio.duration || 0;
  });
</script>

</body>
</html>
